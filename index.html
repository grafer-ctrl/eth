<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GBPUSD Price Action Signal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  color:white;
  padding:20px;
}

.container{
  max-width:1400px;
  margin:auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:15px;
  margin-bottom:20px;
}

.title{
  font-size:30px;
  font-weight:bold;
}

.live-price{
  background:#111827;
  padding:15px 25px;
  border-radius:15px;
  font-size:28px;
  font-weight:bold;
  border:1px solid #1f2937;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-bottom:20px;
}

.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:20px;
  padding:20px;
}

.card h3{
  color:#94a3b8;
  margin-bottom:15px;
  font-size:14px;
}

.big{
  font-size:34px;
  font-weight:bold;
}

.buy{
  color:#22c55e;
}

.sell{
  color:#ef4444;
}

.wait{
  color:#facc15;
}

.signal-box{
  text-align:center;
}

.signal-text{
  font-size:52px;
  font-weight:bold;
}

.small{
  margin-top:10px;
  color:#94a3b8;
}

.chart-container{
  overflow:hidden;
  border-radius:20px;
  margin-bottom:20px;
  border:1px solid #1f2937;
}

.analysis{
  line-height:1.8;
  color:#cbd5e1;
}

.footer{
  margin-top:20px;
  text-align:center;
  color:#64748b;
}

.status{
  margin-top:10px;
  color:#94a3b8;
  font-size:13px;
}

@media(max-width:768px){

  .signal-text{
    font-size:38px;
  }

  .big{
    font-size:26px;
  }

}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title">
      GBPUSD PRICE ACTION SIGNAL
    </div>

    <div class="live-price" id="price">
      Loading...
    </div>
  </div>

  <div class="grid">

    <div class="card signal-box">

      <h3>MAIN SIGNAL</h3>

      <div class="signal-text wait" id="signal">
        WAIT
      </div>

      <div class="small" id="confidence">
        Confidence: 0%
      </div>

    </div>

    <div class="card">
      <h3>H4 TREND</h3>
      <div class="big" id="trend">-</div>
    </div>

    <div class="card">
      <h3>ENTRY</h3>
      <div class="big" id="entry">-</div>
    </div>

    <div class="card">
      <h3>STOP LOSS</h3>
      <div class="big" id="sl">-</div>
    </div>

    <div class="card">
      <h3>TAKE PROFIT</h3>
      <div class="big" id="tp">-</div>
    </div>

  </div>

  <div class="chart-container">
    <div id="tradingview_chart" style="height:600px;"></div>
  </div>

  <div class="card">

    <h3>PRICE ACTION ANALYSIS</h3>

    <div class="analysis" id="analysis">
      Waiting data...
    </div>

    <div class="status" id="status">
      Connecting realtime market...
    </div>

  </div>

  <div class="footer">
    GBPUSD Signal Tool • H1 Entry • H4 Trend Filter
  </div>

</div>

<script>

const API_URL =
"https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/GBPUSD=X?interval=1h&range=5d";

async function fetchForexData(){

  try{

    document.getElementById("status").innerHTML =
    "Loading realtime data...";

    const response = await fetch(API_URL);

    const data = await response.json();

    if(!data.chart || !data.chart.result){

      throw new Error("Invalid data");

    }

    const result = data.chart.result[0];

    const quote = result.indicators.quote[0];

    const closes = quote.close.filter(v => v !== null);
    const opens = quote.open.filter(v => v !== null);
    const highs = quote.high.filter(v => v !== null);
    const lows = quote.low.filter(v => v !== null);

    const currentPrice = closes[closes.length - 1];

    document.getElementById("price").innerHTML =
    currentPrice.toFixed(5);

    analyzeMarket(closes, opens, highs, lows);

    document.getElementById("status").innerHTML =
    "Realtime connected • Updated " + new Date().toLocaleTimeString();

  }

  catch(error){

    console.log(error);

    document.getElementById("status").innerHTML =
    "Failed loading realtime data";

    document.getElementById("analysis").innerHTML =
    "Yahoo Finance blocked request or connection problem.";

  }

}

function average(arr){

  return arr.reduce((a,b)=>a+b,0)/arr.length;

}

function analyzeMarket(closes, opens, highs, lows){

  const lastClose = closes[closes.length - 1];

  const ema20 = average(closes.slice(-20));
  const ema50 = average(closes.slice(-50));

  let trend = "SIDEWAYS";
  let signal = "WAIT";
  let confidence = 50;

  let analysis = [];

  // TREND DETECTION

  if(ema20 > ema50){

    trend = "BULLISH";
    confidence += 20;

    analysis.push("H4 trend bullish.");
    analysis.push("EMA20 above EMA50.");

  }
  else{

    trend = "BEARISH";
    confidence += 20;

    analysis.push("H4 trend bearish.");
    analysis.push("EMA20 below EMA50.");

  }

  // ENGULFING

  const prevOpen = opens[opens.length - 2];
  const prevClose = closes[closes.length - 2];

  const currentOpen = opens[opens.length - 1];
  const currentClose = closes[closes.length - 1];

  const bullishEngulfing =
    prevOpen > prevClose &&
    currentClose > currentOpen &&
    currentClose > prevOpen;

  const bearishEngulfing =
    prevOpen < prevClose &&
    currentClose < currentOpen &&
    currentClose < prevOpen;

  // SUPPORT RESISTANCE

  const resistance =
    Math.max(...highs.slice(-20));

  const support =
    Math.min(...lows.slice(-20));

  // BUY SIGNAL

  if(
    trend === "BULLISH" &&
    bullishEngulfing &&
    lastClose >= resistance * 0.999
  ){

    signal = "BUY";
    confidence += 30;

    analysis.push("Bullish engulfing detected.");
    analysis.push("Resistance breakout confirmed.");
    analysis.push("Strong bullish momentum.");

    document.getElementById("signal").className =
    "signal-text buy";

  }

  // SELL SIGNAL

  else if(
    trend === "BEARISH" &&
    bearishEngulfing &&
    lastClose <= support * 1.001
  ){

    signal = "SELL";
    confidence += 30;

    analysis.push("Bearish engulfing detected.");
    analysis.push("Support breakout confirmed.");
    analysis.push("Strong bearish momentum.");

    document.getElementById("signal").className =
    "signal-text sell";

  }

  else{

    signal = "WAIT";

    analysis.push("No valid breakout.");
    analysis.push("Waiting confirmation candle.");
    analysis.push("Market consolidation detected.");

    document.getElementById("signal").className =
    "signal-text wait";

  }

  // ENTRY SL TP

  let sl,tp;

  if(signal === "BUY"){

    sl = (lastClose - 0.0020).toFixed(5);
    tp = (lastClose + 0.0040).toFixed(5);

  }
  else if(signal === "SELL"){

    sl = (lastClose + 0.0020).toFixed(5);
    tp = (lastClose - 0.0040).toFixed(5);

  }
  else{

    sl = "-";
    tp = "-";

  }

  // UPDATE UI

  document.getElementById("signal").innerHTML =
  signal;

  document.getElementById("confidence").innerHTML =
  "Confidence: " + confidence + "%";

  document.getElementById("trend").innerHTML =
  trend;

  document.getElementById("entry").innerHTML =
  lastClose.toFixed(5);

  document.getElementById("sl").innerHTML =
  sl;

  document.getElementById("tp").innerHTML =
  tp;

  document.getElementById("analysis").innerHTML =
  analysis.join("<br>");

}

// INITIAL LOAD

fetchForexData();

// AUTO REFRESH

setInterval(fetchForexData,10000);

// TRADINGVIEW CHART

new TradingView.widget({

  "autosize": true,
  "symbol": "FX:GBPUSD",
  "interval": "60",
  "timezone": "Asia/Jakarta",
  "theme": "dark",
  "style": "1",
  "locale": "id",
  "toolbar_bg": "#0f172a",
  "enable_publishing": false,
  "allow_symbol_change": false,
  "container_id": "tradingview_chart"

});

</script>

</body>
</html>
