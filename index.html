<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GBP/USD Multi Timeframe Analyzer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

.top-box{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:16px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.price{
    font-size:35px;
    font-weight:bold;
    color:#4ade80;
}

.signal-buy{
    color:#22c55e;
    font-weight:bold;
}

.signal-sell{
    color:#ef4444;
    font-weight:bold;
}

.signal-wait{
    color:#facc15;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    padding:14px;
    border-bottom:1px solid #334155;
    text-align:center;
}

th{
    background:#1e293b;
}

.buy{
    color:#22c55e;
    font-weight:bold;
}

.sell{
    color:#ef4444;
    font-weight:bold;
}

.wait{
    color:#facc15;
    font-weight:bold;
}

.summary{
    margin-top:25px;
    background:#1e293b;
    padding:20px;
    border-radius:16px;
    line-height:1.7;
}

.loading{
    text-align:center;
    margin-top:30px;
    color:#94a3b8;
}

.refresh{
    margin-top:15px;
    background:#38bdf8;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    color:black;
    font-weight:bold;
}

.refresh:hover{
    opacity:0.9;
}
</style>
</head>
<body>

<div class="container">

<h1>GBP/USD Smart Multi Timeframe Analyzer</h1>

<div class="top-box">

<div class="card">
    <h3>Live GBP/USD</h3>
    <div class="price" id="price">Loading...</div>
</div>

<div class="card">
    <h3>Overall Signal</h3>
    <div id="overallSignal" style="font-size:28px;margin-top:10px;">
        Analyzing...
    </div>
</div>

<div class="card">
    <h3>Recommendation</h3>
    <div id="recommendation" style="margin-top:10px;">
        Waiting data...
    </div>
</div>

</div>

<div class="card">
    <h2>Multi Timeframe Analysis</h2>

    <table>
        <thead>
            <tr>
                <th>Timeframe</th>
                <th>Trend</th>
                <th>RSI</th>
                <th>EMA</th>
                <th>Signal</th>
                <th>Reason</th>
            </tr>
        </thead>

        <tbody id="tableData"></tbody>
    </table>

    <button class="refresh" onclick="loadData()">
        Refresh Analysis
    </button>
</div>

<div class="summary">
    <h2>AI Conclusion</h2>
    <p id="summaryText">
        Loading analysis...
    </p>
</div>

</div>

<script>

// ================================
// FREE API
// ================================

// Gunakan AlphaVantage GRATIS
// https://www.alphavantage.co/support/#api-key

const API_KEY = "demo";

// Multi TF
const timeframes = [
    {name:"5M", interval:"5min"},
    {name:"15M", interval:"15min"},
    {name:"30M", interval:"30min"},
    {name:"1H", interval:"60min"},
    {name:"4H", interval:"60min"},
    {name:"1D", interval:"Daily"},
    {name:"1W", interval:"Weekly"}
];

async function getForexPrice(){

    const url =
    `https://www.alphavantage.co/query?function=CURRENCY_EXCHANGE_RATE&from_currency=GBP&to_currency=USD&apikey=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    const price =
    data["Realtime Currency Exchange Rate"]["5. Exchange Rate"];

    document.getElementById("price").innerText =
    parseFloat(price).toFixed(5);

    return parseFloat(price);
}

// Fake analysis simulation
// nanti bisa dikembangkan ke EMA asli + RSI asli

function randomSignal(){

    const signals = ["BUY","SELL","WAIT"];

    return signals[Math.floor(Math.random()*signals.length)];
}

function randomRSI(){
    return Math.floor(Math.random()*60)+20;
}

function calculateEMA(price){
    return (price + (Math.random()*0.01)).toFixed(5);
}

function analyzeSignal(rsi, price, ema){

    if(rsi < 35 && price > ema){
        return {
            signal:"BUY",
            reason:"RSI oversold + harga di atas EMA"
        };
    }

    if(rsi > 70 && price < ema){
        return {
            signal:"SELL",
            reason:"RSI overbought + harga di bawah EMA"
        };
    }

    return {
        signal:"WAIT",
        reason:"Market belum valid"
    };
}

async function loadData(){

    document.getElementById("tableData").innerHTML =
    `<tr><td colspan="6" class="loading">Analyzing Market...</td></tr>`;

    const price = await getForexPrice();

    let buyCount = 0;
    let sellCount = 0;

    let html = "";

    for(let tf of timeframes){

        const rsi = randomRSI();
        const ema = calculateEMA(price);

        const analysis =
        analyzeSignal(rsi, price, ema);

        let trend = "SIDEWAYS";

        if(price > ema){
            trend = "UPTREND";
        }else{
            trend = "DOWNTREND";
        }

        if(analysis.signal === "BUY"){
            buyCount++;
        }

        if(analysis.signal === "SELL"){
            sellCount++;
        }

        let signalClass = "";

        if(analysis.signal === "BUY"){
            signalClass = "buy";
        }

        if(analysis.signal === "SELL"){
            signalClass = "sell";
        }

        if(analysis.signal === "WAIT"){
            signalClass = "wait";
        }

        html += `
        <tr>
            <td>${tf.name}</td>
            <td>${trend}</td>
            <td>${rsi}</td>
            <td>${ema}</td>
            <td class="${signalClass}">
                ${analysis.signal}
            </td>
            <td>${analysis.reason}</td>
        </tr>
        `;
    }

    document.getElementById("tableData").innerHTML = html;

    // =========================
    // FINAL CONCLUSION
    // =========================

    let overall = "";
    let rec = "";
    let summary = "";

    if(buyCount > sellCount){

        overall =
        `<span class="signal-buy">BUY DOMINANT</span>`;

        rec =
        `Disarankan cari peluang BUY`;

        summary =
        `
        Mayoritas timeframe menunjukkan tekanan bullish.
        Entry terbaik menunggu retracement kecil.
        Hindari entry saat candle terlalu panjang.
        Fokus validasi di TF 15M dan 1H.
        `;

    }else if(sellCount > buyCount){

        overall =
        `<span class="signal-sell">SELL DOMINANT</span>`;

        rec =
        `Disarankan cari peluang SELL`;

        summary =
        `
        Mayoritas timeframe menunjukkan tekanan bearish.
        Hindari open buy melawan trend besar.
        Tunggu konfirmasi candle rejection.
        Fokus validasi di TF 15M dan 1H.
        `;

    }else{

        overall =
        `<span class="signal-wait">WAIT / NO TRADE</span>`;

        rec =
        `Market belum jelas`;

        summary =
        `
        Signal antar timeframe masih konflik.
        Risiko false signal tinggi.
        Sebaiknya tunggu market lebih jelas.
        `;
    }

    document.getElementById("overallSignal").innerHTML =
    overall;

    document.getElementById("recommendation").innerHTML =
    rec;

    document.getElementById("summaryText").innerHTML =
    summary;
}

loadData();

// Auto refresh
setInterval(loadData, 60000);

</script>

</body>
</html>
