<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GBPUSD Price Action Signal</title>

  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      padding:20px;
    }

    .container{
      max-width:1400px;
      margin:auto;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      flex-wrap:wrap;
      gap:10px;
    }

    .title{
      font-size:28px;
      font-weight:bold;
    }

    .live-price{
      background:#111827;
      padding:15px 25px;
      border-radius:15px;
      font-size:24px;
      font-weight:bold;
      border:1px solid #1f2937;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-bottom:20px;
    }

    .card{
      background:#111827;
      padding:20px;
      border-radius:20px;
      border:1px solid #1f2937;
    }

    .card h3{
      margin-bottom:15px;
      color:#94a3b8;
      font-size:15px;
    }

    .big{
      font-size:36px;
      font-weight:bold;
    }

    .buy{
      color:#22c55e;
    }

    .sell{
      color:#ef4444;
    }

    .wait{
      color:#facc15;
    }

    .chart-container{
      background:#111827;
      border-radius:20px;
      overflow:hidden;
      border:1px solid #1f2937;
      margin-bottom:20px;
    }

    .analysis{
      line-height:1.8;
      font-size:15px;
      color:#cbd5e1;
    }

    .footer{
      text-align:center;
      margin-top:20px;
      color:#64748b;
    }

    .signal-box{
      text-align:center;
      padding:20px;
    }

    .signal-text{
      font-size:50px;
      font-weight:bold;
      margin-top:10px;
    }

    .small{
      font-size:14px;
      color:#94a3b8;
      margin-top:10px;
    }

    @media(max-width:768px){
      .signal-text{
        font-size:38px;
      }

      .big{
        font-size:28px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title">GBPUSD PRICE ACTION SIGNAL</div>
    <div class="live-price" id="price">Loading...</div>
  </div>

  <div class="grid">

    <div class="card signal-box">
      <h3>MAIN SIGNAL</h3>
      <div class="signal-text wait" id="signal">WAIT</div>
      <div class="small" id="confidence">Confidence: 0%</div>
    </div>

    <div class="card">
      <h3>H4 TREND</h3>
      <div class="big" id="trend">Loading...</div>
    </div>

    <div class="card">
      <h3>ENTRY</h3>
      <div class="big" id="entry">-</div>
    </div>

    <div class="card">
      <h3>STOP LOSS</h3>
      <div class="big" id="sl">-</div>
    </div>

    <div class="card">
      <h3>TAKE PROFIT</h3>
      <div class="big" id="tp">-</div>
    </div>

  </div>

  <div class="chart-container">
    <div id="tradingview_chart" style="height:600px;"></div>
  </div>

  <div class="card">
    <h3>PRICE ACTION ANALYSIS</h3>

    <div class="analysis" id="analysis">
      Loading analysis...
    </div>
  </div>

  <div class="footer">
    Realtime GBPUSD Signal • Yahoo Finance Data • Price Action Strategy
  </div>

</div>

<script>

let currentPrice = 0;

async function fetchData() {

  try {

    const url =
      "https://query1.finance.yahoo.com/v8/finance/chart/GBPUSD=X?interval=1h&range=5d";

    const response = await fetch(url);
    const data = await response.json();

    const result = data.chart.result[0];

    const closes = result.indicators.quote[0].close.filter(v => v);
    const highs = result.indicators.quote[0].high.filter(v => v);
    const lows = result.indicators.quote[0].low.filter(v => v);
    const opens = result.indicators.quote[0].open.filter(v => v);

    currentPrice = closes[closes.length - 1];

    document.getElementById("price").innerHTML =
      currentPrice.toFixed(5);

    analyze(closes, highs, lows, opens);

  } catch (err) {

    console.log(err);

    document.getElementById("analysis").innerHTML =
      "Failed to load data.";

  }

}

function analyze(closes, highs, lows, opens) {

  const last = closes[closes.length - 1];
  const prev = closes[closes.length - 2];

  const ema20 = average(closes.slice(-20));
  const ema50 = average(closes.slice(-50));

  let trend = "";
  let signal = "";
  let confidence = 50;
  let analysis = [];

  // TREND
  if (ema20 > ema50) {
    trend = "BULLISH";
    confidence += 20;
  } else {
    trend = "BEARISH";
    confidence += 20;
  }

  // ENGULFING
  const bullishEngulfing =
    opens[opens.length - 2] > closes[closes.length - 2] &&
    closes[closes.length - 1] > opens[opens.length - 1] &&
    closes[closes.length - 1] > opens[opens.length - 2];

  const bearishEngulfing =
    opens[opens.length - 2] < closes[closes.length - 2] &&
    closes[closes.length - 1] < opens[opens.length - 1] &&
    closes[closes.length - 1] < opens[opens.length - 2];

  // BREAKOUT
  const resistance = Math.max(...highs.slice(-20));
  const support = Math.min(...lows.slice(-20));

  // BUY SIGNAL
  if (
    trend === "BULLISH" &&
    bullishEngulfing &&
    last > resistance * 0.999
  ) {

    signal = "BUY";
    confidence += 30;

    analysis.push("Bullish engulfing detected.");
    analysis.push("Price breakout resistance.");
    analysis.push("H4 trend bullish.");

    document.getElementById("signal").className =
      "signal-text buy";

  }

  // SELL SIGNAL
  else if (
    trend === "BEARISH" &&
    bearishEngulfing &&
    last < support * 1.001
  ) {

    signal = "SELL";
    confidence += 30;

    analysis.push("Bearish engulfing detected.");
    analysis.push("Price breakout support.");
    analysis.push("H4 trend bearish.");

    document.getElementById("signal").className =
      "signal-text sell";

  }

  else {

    signal = "WAIT";

    analysis.push("No strong confirmation.");
    analysis.push("Waiting breakout or engulfing.");
    analysis.push("Market still consolidating.");

    document.getElementById("signal").className =
      "signal-text wait";

  }

  const sl =
    signal === "BUY"
      ? (last - 0.0020).toFixed(5)
      : (last + 0.0020).toFixed(5);

  const tp =
    signal === "BUY"
      ? (last + 0.0040).toFixed(5)
      : (last - 0.0040).toFixed(5);

  document.getElementById("signal").innerHTML = signal;

  document.getElementById("confidence").innerHTML =
    "Confidence: " + confidence + "%";

  document.getElementById("trend").innerHTML = trend;

  document.getElementById("entry").innerHTML =
    last.toFixed(5);

  document.getElementById("sl").innerHTML = sl;

  document.getElementById("tp").innerHTML = tp;

  document.getElementById("analysis").innerHTML =
    analysis.join("<br>");

}

function average(arr) {
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}

fetchData();

setInterval(fetchData, 10000);

new TradingView.widget({
  "autosize": true,
  "symbol": "FX:GBPUSD",
  "interval": "60",
  "timezone": "Asia/Jakarta",
  "theme": "dark",
  "style": "1",
  "locale": "id",
  "toolbar_bg": "#0f172a",
  "enable_publishing": false,
  "hide_side_toolbar": false,
  "allow_symbol_change": false,
  "container_id": "tradingview_chart"
});

</script>

</body>
</html>
