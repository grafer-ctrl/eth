<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GBPUSD SIGNAL PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:1300px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:38px;
margin-bottom:10px;
}

.header p{
color:#94a3b8;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:18px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.card h2{
margin-bottom:15px;
font-size:22px;
}

.signal{
font-size:32px;
font-weight:bold;
margin-top:10px;
}

.buy{
color:#22c55e;
}

.sell{
color:#ef4444;
}

.neutral{
color:#facc15;
}

.small{
margin-top:10px;
color:#94a3b8;
font-size:14px;
line-height:1.5;
}

.trend-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:25px;
}

.trend-card{
background:#111827;
padding:18px;
border-radius:14px;
text-align:center;
}

.trend-card h3{
margin-bottom:10px;
}

button{
padding:14px 24px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.status{
margin-top:20px;
padding:15px;
background:#111827;
border-radius:12px;
color:#94a3b8;
}

footer{
margin-top:35px;
text-align:center;
color:#64748b;
font-size:14px;
}

.loader{
width:20px;
height:20px;
border:3px solid #334155;
border-top:3px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>GBPUSD SIGNAL PRO</h1>
<p>Multi Timeframe Smart Signal Scanner</p>
</div>

<div class="grid">

<div class="card">
<h2>H4 SIGNAL</h2>
<div id="h4Signal" class="signal neutral">
<div class="loader"></div>
</div>
<div id="h4Info" class="small"></div>
</div>

<div class="card">
<h2>D1 SIGNAL</h2>
<div id="d1Signal" class="signal neutral">
<div class="loader"></div>
</div>
<div id="d1Info" class="small"></div>
</div>

<div class="card">
<h2>FINAL SIGNAL</h2>
<div id="finalSignal" class="signal neutral">
<div class="loader"></div>
</div>
<div id="finalInfo" class="small"></div>
</div>

</div>

<div class="trend-grid">

<div class="trend-card">
<h3>M15 TREND</h3>
<div id="m15Trend">-</div>
</div>

<div class="trend-card">
<h3>H1 TREND</h3>
<div id="h1Trend">-</div>
</div>

<div class="trend-card">
<h3>H4 TREND</h3>
<div id="h4Trend">-</div>
</div>

<div class="trend-card">
<h3>D1 TREND</h3>
<div id="d1Trend">-</div>
</div>

</div>

<button onclick="loadSignals()">
REFRESH SIGNAL
</button>

<div class="status" id="status">
Waiting data...
</div>

<footer>
GBPUSD Smart Signal • Free API AlphaVantage
</footer>

</div>

<script>

const API_KEY = "TZ4TYZZIPH6MUCTQ";

function setSignal(id,value){

const el = document.getElementById(id);

el.innerHTML = value;

el.classList.remove("buy","sell","neutral");

if(value === "BUY" || value === "UPTREND"){
el.classList.add("buy");
}
else if(value === "SELL" || value === "DOWNTREND"){
el.classList.add("sell");
}
else{
el.classList.add("neutral");
}

}

async function fetchData(type){

let url = "";

if(type === "daily"){

url =
`https://www.alphavantage.co/query?function=FX_DAILY&from_symbol=GBP&to_symbol=USD&apikey=${API_KEY}`;

}else{

url =
`https://www.alphavantage.co/query?function=FX_INTRADAY&from_symbol=GBP&to_symbol=USD&interval=${type}&apikey=${API_KEY}`;

}

const response = await fetch(url);

const data = await response.json();

return data;

}

function analyzeCandles(series){

const keys = Object.keys(series);

let bullish = 0;
let bearish = 0;

for(let i=0;i<5;i++){

const candle = series[keys[i]];

const open = parseFloat(candle["1. open"]);
const close = parseFloat(candle["4. close"]);

if(close > open){
bullish++;
}

if(close < open){
bearish++;
}

}

if(bullish >= 4){

return {
signal:"BUY",
trend:"UPTREND"
};

}

if(bearish >= 4){

return {
signal:"SELL",
trend:"DOWNTREND"
};

}

return {
signal:"NEUTRAL",
trend:"SIDEWAYS"
};

}

async function loadSignals(){

try{

document.getElementById("status").innerHTML =
"Loading market data...";

const m15 = await fetchData("15min");
const h1 = await fetchData("60min");
const d1 = await fetchData("daily");

const m15Series = m15["Time Series FX (15min)"];
const h1Series = h1["Time Series FX (60min)"];
const d1Series = d1["Time Series FX (Daily)"];

if(!m15Series || !h1Series || !d1Series){

document.getElementById("status").innerHTML =
"API limit reached or invalid response";

return;

}

const m15Result = analyzeCandles(m15Series);
const h1Result = analyzeCandles(h1Series);
const d1Result = analyzeCandles(d1Series);

setSignal("h4Signal", h1Result.signal);
setSignal("d1Signal", d1Result.signal);

setSignal("m15Trend", m15Result.trend);
setSignal("h1Trend", h1Result.trend);
setSignal("h4Trend", h1Result.trend);
setSignal("d1Trend", d1Result.trend);

document.getElementById("h4Info").innerHTML =
"Based on 5 latest H4 candles";

document.getElementById("d1Info").innerHTML =
"Based on 5 latest Daily candles";

let finalSignal = "NEUTRAL";
let finalText = "Market sideways";

if(
h1Result.signal === "BUY" &&
d1Result.signal === "BUY"
){

finalSignal = "BUY";
finalText = "Strong bullish multi timeframe";

}

if(
h1Result.signal === "SELL" &&
d1Result.signal === "SELL"
){

finalSignal = "SELL";
finalText = "Strong bearish multi timeframe";

}

setSignal("finalSignal", finalSignal);

document.getElementById("finalInfo").innerHTML =
finalText;

document.getElementById("status").innerHTML =
"Last update: " + new Date().toLocaleString();

}
catch(error){

console.log(error);

document.getElementById("status").innerHTML =
"Error loading API";

}

}

loadSignals();

setInterval(() => {

loadSignals();

}, 60000);

</script>

</body>
</html>
